services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumen-app
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - .:/app
      - lumen_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  lumen_node_modules:
    name: lumen_node_modules
