services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumen-app
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - .:/app
      - lumen_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
  proxy:
    image: caddy:2-alpine
    container_name: lumen-proxy
    depends_on:
      - app
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    environment:
      LAN_HOST: ${LAN_HOST:-127.0.0.1}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  lumen_node_modules:
    name: lumen_node_modules
  caddy_data:
    name: lumen_caddy_data
  caddy_config:
    name: lumen_caddy_config
