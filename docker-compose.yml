services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumen-app
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - .:/app
      - project_lumen_light_node_modules:/app/node_modules
    command: sh -c "if [ ! -d node_modules/next ]; then npm ci; fi && rm -rf .next && npm run dev"
    networks:
      - lumen
  proxy:
    image: caddy:2-alpine
    container_name: lumen-proxy
    depends_on:
      - app
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    environment:
      LAN_HOST: ${LAN_HOST:-127.0.0.1}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - project_lumen_light_caddy_data:/data
      - project_lumen_light_caddy_config:/config
    networks:
      - lumen

volumes:
  project_lumen_light_node_modules:
    name: project_lumen_light_node_modules
  project_lumen_light_caddy_data:
    name: project_lumen_light_caddy_data
  project_lumen_light_caddy_config:
    name: project_lumen_light_caddy_config

networks:
  lumen:
    name: lumen
    driver: bridge
